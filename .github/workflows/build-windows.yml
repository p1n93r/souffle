name: Build Windows Souffle

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHOCO_CACHE_DIR: "${{ github.workspace }}/choco-cache"
  VCPKG_BINARY_SOURCES: "clear"

jobs:
  build-windows:
    runs-on: windows-2025
    env:
      VCPKG_TARGET_TRIPLET: x64-windows-static
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Dependencies Cache
        uses: actions/cache@v3
        env:
          cache-name: cache-chocolatey
        with:
          path: |
            ${{ env.CHOCO_CACHE_DIR }}
          key: windows-${{ hashFiles('choco-packages.config') }}

      - name: Binary Dependencies (Chocolatey)
        run: |
          choco config set cacheLocation ${{ env.CHOCO_CACHE_DIR }}
          choco install choco-packages.config --no-progress --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
          cd ${{ github.workspace }}/vcpkg
          git checkout 6f29f12e82a8293156836ad81cc9bf5af41fe836
          bootstrap-vcpkg.bat -disableMetrics

      - name: Configure Build (Static Linking)
        working-directory: ${{ github.workspace }}
        run: |
          $env:ChocolateyInstall = Convert-Path "$((Get-Command choco).Path)\..\.."
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=$env:VCPKG_TARGET_TRIPLET" `
            -DVCPKG_APPLOCAL_PACKAGES=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_FLAGS=/bigobj `
            -DSOUFFLE_DOMAIN_64BIT=ON `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded" `
            -DSOUFFLE_USE_CURSES=OFF `
            -DSOUFFLE_USE_ZLIB=ON `
            -DSOUFFLE_USE_SQLITE=ON `
            -DSOUFFLE_USE_LIBFFI=OFF `
            -DCMAKE_FIND_DEBUG_MODE=FALSE `
            -DSOUFFLE_BASH_COMPLETION=OFF

      - name: Build
        working-directory: ${{ github.workspace }}
        run: cmake --build build --config Release -j4

      - name: Collect artifacts (Static Binary)
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          # Find where souffle.exe ended up (VS generator may or may not use Release/ subdirectory)
          $souffleDir = Split-Path -Parent (Get-ChildItem -Recurse -Filter "souffle.exe" build | Select-Object -First 1).FullName
          Write-Host "Found souffle.exe in: $souffleDir"
          # Main executables (statically linked, no DLLs needed)
          Copy-Item "$souffleDir/souffle.exe" dist/
          Copy-Item "$souffleDir/souffleprof.exe" dist/
          # souffle-compile.py (needed for compiled mode)
          Copy-Item "build/src/souffle-compile.py" dist/
          # Also grab the include directory for compiled souffle programs
          Copy-Item -Path "src/include" -Destination "dist/include" -Recurse -Force
          # Verify static linking - show file size and dependency info
          $souffleExe = "dist/souffle.exe"
          Write-Host "=== Binary Info ==="
          Write-Host "File size: $((Get-Item $souffleExe).Length / 1MB) MB"
          Write-Host "=== Dependencies (should be minimal for static binary) ==="
          # List any remaining DLL dependencies

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: souffle-windows-x64
          path: dist/
          retention-days: 30
